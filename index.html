<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Games – 2026 Regular Season</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',sans-serif;background:#ffffff;min-height:100vh;display:flex;flex-direction:column;}

/* Header */
.header{background:#7d1a1a;padding:26px 20px 22px;text-align:center;position:relative;overflow:hidden;}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#c9b5a5,#e07878,#c9b5a5);}
.header h1{font-family:'Playfair Display',Georgia,serif;font-size:1.55rem;color:#e8b4b4;font-weight:800;letter-spacing:.02em;}
.header .sub{font-size:.72rem;color:#c98a8a;margin-top:4px;letter-spacing:.12em;font-weight:600;}

/* Notice */
.notice{padding:10px 16px;font-size:.78rem;font-weight:600;color:#5c1010;background:#e8ddd3;text-align:center;border-bottom:1px solid #d0bfaf;}

/* Filters */
.filters{background:#d8c8ba;border-bottom:2px solid #b8a492;padding:16px 16px 14px;}
.filter-row{display:flex;gap:12px;flex-wrap:wrap;max-width:700px;margin:0 auto;}
.fg{flex:1;min-width:140px;}
.fg label{display:block;font-size:.68rem;font-weight:700;color:#5c1010;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;font-family:'Source Sans 3',sans-serif;}
.fg select{width:100%;padding:9px 12px;border:2px solid #b8a492;border-radius:6px;font-size:.88rem;font-weight:600;color:#5c1010;background:#fff;cursor:pointer;font-family:'Source Sans 3',sans-serif;transition:border-color .2s;}
.fg select:focus{outline:none;border-color:#7d1a1a;box-shadow:0 0 0 3px rgba(125,26,26,.15);}
.fg select:disabled{opacity:.5;cursor:not-allowed;}

/* Main */
.main{max-width:700px;margin:0 auto;padding:20px 14px 40px;flex:1;width:100%;}

/* Empty state */
.empty{background:#fff;border-radius:12px;text-align:center;padding:48px 24px;box-shadow:0 2px 14px rgba(80,20,20,.08);}
.empty .icon{font-size:2.6rem;margin-bottom:12px;}
.empty h3{font-family:'Playfair Display',Georgia,serif;color:#7d1a1a;font-size:1.05rem;margin-bottom:6px;}
.empty p{font-size:.85rem;color:#666;line-height:1.65;}

/* Stats bar */
.statsbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.badge{display:inline-flex;align-items:center;gap:7px;background:#7d1a1a;color:#fff;padding:6px 14px 6px 10px;border-radius:20px;font-size:.82rem;font-weight:700;}
.badge .dot{width:7px;height:7px;border-radius:50%;background:#e07878;}
.cnt{font-size:.76rem;color:#5c1010;font-weight:600;}

/* Day section */
.day-section{margin-bottom:26px;}
.day-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.day-name{font-family:'Playfair Display',Georgia,serif;font-size:1.1rem;font-weight:700;color:#5c1010;white-space:nowrap;}
.day-count{font-size:.7rem;font-weight:700;color:#fff;background:#7d1a1a;padding:2px 9px;border-radius:10px;white-space:nowrap;}
.day-line{flex:1;height:1px;background:#b8a492;}

/* Game card */
.card{background:#fff;border-radius:10px;box-shadow:0 2px 10px rgba(80,20,20,.08);padding:14px 16px;margin-bottom:9px;border-left:4px solid #7d1a1a;display:flex;align-items:center;gap:14px;transition:transform .15s,box-shadow .15s;}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(80,20,20,.13);}
.card.win{border-left-color:#1a7d1a;}
.card.loss{border-left-color:#a02020;}
.time-col{text-align:center;min-width:108px;flex-shrink:0;}
.time-main{font-family:'Playfair Display',Georgia,serif;font-size:.82rem;font-weight:700;color:#7d1a1a;line-height:1.35;}
.divider{width:1px;height:48px;background:#d8c8ba;flex-shrink:0;}
.info-col{flex:1;min-width:0;}
.matchup{font-weight:700;font-size:.93rem;color:#222;line-height:1.3;}
.matchup .vs{color:#7d1a1a;margin:0 5px;font-weight:800;font-size:.8rem;}
.meta-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:5px;}
.venue-tag{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;font-weight:600;}
.venue-tag a{color:#2d3a8c;text-decoration:underline;}
.venue-tag a:hover{color:#7d1a1a;}
.rcol{text-align:center;min-width:60px;flex-shrink:0;border-left:1px solid #d8c8ba;padding-left:12px;}
.rlabel{font-size:.6rem;font-weight:700;color:#b8a492;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.result{display:inline-block;font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:4px;}
.result.w{background:#1a7d1a;color:#fff;}
.result.l{background:#a02020;color:#fff;}
.result.tbd{background:#b8a492;color:#fff;}

@media(max-width:520px){
  .filter-row{flex-direction:column;}
  .fg{min-width:100%;}
  .time-col{min-width:90px;}
  .card{gap:10px;padding:12px;}
}
</style>
</head>
<body>

<div class="header">
  <h1>🏀 My Games</h1>
  <div class="sub">NA Coptic League · 2026 Season · May 2026 – July 2026</div>
</div>

<div class="notice">Games are still being added — the full and completed schedule will be displayed no later than May 2, 2026.</div>

<div class="filters">
  <div class="filter-row">
    <div class="fg">
      <label>Division</label>
      <select id="sdiv" onchange="onDiv()">
        <option value="">— Select Division —</option>
        <option value="HS-NY">High School — NY</option>
        <option value="HS-NJ">High School — NJ</option>
        <option value="JHS">Junior High (JHS)</option>
        <option value="Girls">Girls</option>
        <option value="College">College</option>
        <option value="Mens">Mens</option>
      </select>
    </div>
    <div class="fg">
      <label>Team</label>
      <select id="steam" onchange="onTeam()" disabled>
        <option value="">— Select Division First —</option>
      </select>
    </div>
  </div>
</div>

<div class="main"><div id="out">
  <div class="empty"><div class="icon">🏀</div><h3>Find Your Team's Schedule</h3><p>Select your division and team above<br>to view your team schedule.</p></div>
</div></div>

<script>
var VENUES={
  HC:{name:"Holy Child Catholic Church",url:"https://maps.google.com/?q=4747+Amboy+Rd,+Staten+Island,+NY+10312"},
  BK:{name:"St. George Community Center",url:"https://maps.google.com/?q=6209+11th+Ave,+Brooklyn,+NY+11219"}
};

var TEAMS={
  "HS-NY":  ["Astoria","Brooklyn (1)","Brooklyn (2)","Long Island (1)","Long Island (2)","Queens","SI1 (1)","SI1 (2)","SI2 (1)","SI2 (2)"],
  "HS-NJ":  ["Bayonne 1 (SASA) (1)","Bayonne 1 (SASA) (2)","Bayonne 2 (VMSJ) (1)","Bayonne 2 (VMSJ) (2)","Belleville","EB (1)","EB (2)","EB (3)","Holmdel","Makkar","Paramus","Philadelphia","Piscataway","Upstate","West Side"],
  "Girls":  ["Astoria","Bayonne 1 (SASA)","Belleville","Brooklyn","EB (1)","EB (2)","Holmdel","Makkar","Queens","SI1","SI2","SI3","Upstate"],
  "JHS":    ["Astoria","Bayonne 1 (SASA)","Bayonne 2 (VMSJ)","EB (1)","EB (2)","Holmdel","Makkar","Philadelphia","Queens","SI1","SI2","Summit","West Side"],
  "College":["Bayonne 1 (SASA)","Bayonne 2 (VMSJ)","Belleville","Brooklyn","EB (1)","EB (2)","EB (3)","Holmdel","Long Island","Philadelphia","Piscataway","Queens","SI1","SI2","Upstate"],
  "Mens":   ["Bayonne 1 (SASA)","EB","Hatfield","Holmdel","Long Island","Queens","SI1","SI2","Summit"]
};

var GAMES=[
  // HS-NY
  {t1:"SI1 (1)",t2:"SI2 (1)",div:"HS-NY",date:"2026-05-03",time:"8:00 PM",v:"HC",winner:"",s1:"",s2:""},
  {t1:"SI1 (2)",t2:"SI2 (2)",div:"HS-NY",date:"2026-05-02",time:"6:00 PM",v:"HC",winner:"",s1:"",s2:""},
  {t1:"Brooklyn (1)",t2:"Brooklyn (2)",div:"HS-NY",date:"2026-05-02",time:"7:00 PM",v:"BK",winner:"",s1:"",s2:""},
  {t1:"Queens",t2:"Astoria",div:"HS-NY",date:"2026-05-02",time:"2:00 PM",v:"BK",winner:"",s1:"",s2:""},
  // HS-NJ
  {t1:"Bayonne 1 (SASA) (1)",t2:"Belleville",div:"HS-NJ",date:"2026-05-03",time:"4:00 PM",v:"HC",winner:"",s1:"",s2:""},
  {t1:"West Side",t2:"Holmdel",div:"HS-NJ",date:"2026-05-03",time:"7:00 PM",v:"HC",winner:"",s1:"",s2:""},
  {t1:"Upstate",t2:"Piscataway",div:"HS-NJ",date:"2026-05-03",time:"6:00 PM",v:"HC",winner:"",s1:"",s2:""},
  // JHS
  {t1:"Queens",t2:"Astoria",div:"JHS",date:"2026-05-02",time:"1:00 PM",v:"BK",winner:"",s1:"",s2:""},
  {t1:"West Side",t2:"Bayonne 1 (SASA)",div:"JHS",date:"2026-05-03",time:"2:00 PM",v:"HC",winner:"",s1:"",s2:""},
  {t1:"SI1",t2:"Queens",div:"JHS",date:"2026-05-02",time:"3:00 PM",v:"BK",winner:"",s1:"",s2:""},
  {t1:"SI2",t2:"Astoria",div:"JHS",date:"2026-05-02",time:"4:00 PM",v:"BK",winner:"",s1:"",s2:""},
  // Girls
  {t1:"SI1",t2:"SI2",div:"Girls",date:"2026-05-02",time:"8:00 PM",v:"HC",winner:"",s1:"",s2:""},
  {t1:"Brooklyn",t2:"Queens",div:"Girls",date:"2026-05-02",time:"5:00 PM",v:"BK",winner:"",s1:"",s2:""},
  {t1:"Belleville",t2:"Holmdel",div:"Girls",date:"2026-05-03",time:"5:00 PM",v:"HC",winner:"",s1:"",s2:""},
  // College
  {t1:"Brooklyn",t2:"Bayonne 2 (VMSJ)",div:"College",date:"2026-05-02",time:"6:00 PM",v:"BK",winner:"",s1:"",s2:""},
  {t1:"Philadelphia",t2:"Holmdel",div:"College",date:"2026-05-02",time:"5:00 PM",v:"HC",winner:"",s1:"",s2:""},
  {t1:"Piscataway",t2:"Bayonne 1 (SASA)",div:"College",date:"2026-05-03",time:"3:00 PM",v:"HC",winner:"",s1:"",s2:""},
  {t1:"Queens",t2:"SI2",div:"College",date:"2026-05-02",time:"12:00 PM",v:"BK",winner:"",s1:"",s2:""},
  // Mens
  {t1:"SI2",t2:"Holmdel",div:"Mens",date:"2026-05-02",time:"7:00 PM",v:"HC",winner:"",s1:"",s2:""},
  {t1:"SI1",t2:"Bayonne 1 (SASA)",div:"Mens",date:"2026-05-02",time:"4:00 PM",v:"HC",winner:"",s1:"",s2:""}
];

function addHour(time){
  var p=time.split(' '),hm=p[0].split(':'),h=+hm[0],m=hm[1],ap=p[1];
  var eh=h+1,eap=ap;
  if(h===11&&ap==='AM')eap='PM';
  if(eh>12)eh-=12;
  return p[0]+' '+ap+' – '+eh+':'+m+' '+eap;
}

function fmtDateLong(d){
  return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

function timeSort(a,b){
  function to24(t){var p=t.split(' '),hm=p[0].split(':'),h=+hm[0],m=+hm[1];if(p[1]==='PM'&&h!==12)h+=12;if(p[1]==='AM'&&h===12)h=0;return h*60+m;}
  return to24(a.time)-to24(b.time);
}

function onDiv(){
  var div=document.getElementById('sdiv').value;
  var ts=document.getElementById('steam');
  ts.innerHTML='<option value="">— Select Team —</option>';
  if(div&&TEAMS[div]){
    TEAMS[div].forEach(function(t){var o=document.createElement('option');o.value=t;o.text=t;ts.appendChild(o);});
    ts.disabled=false;
  } else {
    ts.disabled=true;
  }
  document.getElementById('out').innerHTML='<div class="empty"><div class="icon">🏀</div><h3>Find Your Team\'s Schedule</h3><p>Now select your team.</p></div>';
}

function onTeam(){
  var div=document.getElementById('sdiv').value;
  var team=document.getElementById('steam').value;
  var out=document.getElementById('out');
  if(!team||!div) return;

  var f=GAMES.filter(function(g){return g.div===div&&(g.t1===team||g.t2===team);}).sort(timeSort);

  if(!f.length){
    out.innerHTML='<div class="empty"><div class="icon">📅</div><h3>No Games Scheduled Yet</h3><p>Check back soon for games.</p></div>';
    return;
  }

  var wins=0,losses=0;
  f.forEach(function(g){
    if(!g.winner) return;
    var iWon=(g.winner==='t1'&&g.t1===team)||(g.winner==='t2'&&g.t2===team);
    if(iWon) wins++; else losses++;
  });

  var record=(wins>0||losses>0)?' &nbsp;|&nbsp; '+wins+'W – '+losses+'L':'';
  var h='<div class="statsbar"><div class="badge"><div class="dot"></div>'+team+'</div><div class="cnt">'+f.length+' game'+(f.length!==1?'s':'')+' &middot; '+div+record+'</div></div>';

  var by={};
  f.forEach(function(g){if(!by[g.date])by[g.date]=[];by[g.date].push(g);});

  Object.keys(by).sort().forEach(function(date){
    var games=by[date].sort(timeSort);
    var dl=fmtDateLong(date);
    h+='<div class="day-section"><div class="day-header"><span class="day-name">'+dl+'</span><span class="day-count">'+games.length+' game'+(games.length!==1?'s':'')+'</span><div class="day-line"></div></div>';
    games.forEach(function(g){
      var tr=addHour(g.time);
      var vn=VENUES[g.v];
      var vhtml=vn?'<span class="venue-tag">📍 <a href="'+vn.url+'" target="_blank">'+vn.name+'</a></span>':'';
      var opp=g.t1===team?g.t2:g.t1;
      var resultClass='tbd',resultText='TBD',cardClass='';
      if(g.winner){
        var iWon=(g.winner==='t1'&&g.t1===team)||(g.winner==='t2'&&g.t2===team);
        resultClass=iWon?'w':'l';
        var myScore=iWon?(g.winner==='t1'?g.s1:g.s2):(g.winner==='t1'?g.s2:g.s1);
        var oppScore=iWon?(g.winner==='t1'?g.s2:g.s1):(g.winner==='t1'?g.s1:g.s2);
        resultText=(iWon?'W':'L')+(myScore?'&nbsp;'+myScore+'-'+oppScore:'');
        cardClass=iWon?' win':' loss';
      }
      h+='<div class="card'+cardClass+'">';
      h+='<div class="card-top"><div class="time-main">'+tr+'</div><span class="result '+resultClass+'">'+resultText+'</span></div>';
      h+='<div class="matchup"><strong>'+team+'</strong><span class="vs">vs.</span>'+opp+'</div>';
      h+='<div class="venue-tag">📍 '+vhtml+'</div>';
      h+='</div>';
    });
    h+='</div>';
  });
  out.innerHTML=h;
}
</script>
</body>
</html>
