<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NA Coptic League Schedule</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #c9b5a5; }
.header { background: #7d1a1a; padding: 22px 20px; text-align: center; }
.header h1 { font-family: Georgia, serif; font-size: 1.5rem; color: #e07878; font-weight: 700; }
.filters { background: #d8c8ba; border-bottom: 2px solid #b8a492; padding: 14px 16px; }
.filter-row { display: flex; gap: 12px; flex-wrap: wrap; max-width: 660px; margin: 0 auto; }
.fg { flex: 1; min-width: 140px; }
.fg label { display: block; font-size: 0.7rem; font-weight: 700; color: #5c1010; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; }
.fg select { width: 100%; padding: 9px 12px; border: 2px solid #b8a492; border-radius: 6px; font-size: 0.9rem; font-weight: 600; color: #5c1010; background: #fff; cursor: pointer; }
.fg select:focus { outline: 2px solid #7d1a1a; }
.main { max-width: 660px; margin: 0 auto; padding: 18px 14px 36px; }
.empty { background: #fff; border-radius: 10px; text-align: center; padding: 44px 20px; box-shadow: 0 2px 10px rgba(80,20,20,.1); }
.empty .icon { font-size: 2.4rem; margin-bottom: 10px; }
.empty h3 { font-family: Georgia, serif; color: #7d1a1a; font-size: 1rem; margin-bottom: 6px; }
.empty p { font-size: 0.85rem; color: #555; line-height: 1.6; }
.statsbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
.badge { display: inline-flex; align-items: center; gap: 6px; background: #7d1a1a; color: #fff; padding: 5px 13px 5px 9px; border-radius: 20px; font-size: 0.82rem; font-weight: 700; }
.badge .dot { width: 7px; height: 7px; border-radius: 50%; background: #e07878; }
.cnt { font-size: 0.76rem; color: #5c1010; font-weight: 600; }
.dg { margin-bottom: 20px; }
.dh { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.dlabel { font-family: Georgia, serif; font-size: 0.8rem; font-weight: 700; color: #5c1010; white-space: nowrap; }
.dline { flex: 1; height: 1px; background: #b8a492; }
.card { background: #fff; border-radius: 10px; box-shadow: 0 2px 10px rgba(80,20,20,.1); padding: 13px 15px; margin-bottom: 9px; border-left: 4px solid #7d1a1a; display: flex; align-items: center; gap: 13px; }
.tcol { text-align: center; min-width: 52px; flex-shrink: 0; }
.thour { font-family: Georgia, serif; font-size: 0.96rem; font-weight: 700; color: #7d1a1a; line-height: 1; }
.tampm { font-size: 0.62rem; color: #555; font-weight: 700; text-transform: uppercase; margin-top: 2px; }
.divdr { width: 1px; height: 38px; background: #c9b5a5; flex-shrink: 0; }
.mcol { flex: 1; min-width: 0; }
.vs { font-size: 0.68rem; color: #555; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px; }
.teams { font-weight: 700; font-size: 0.93rem; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.teams .sep { color: #7d1a1a; margin: 0 4px; }
.teams .opp { color: #555; }
.venue { display: inline-flex; align-items: center; gap: 4px; font-size: 0.7rem; font-weight: 600; margin-top: 4px; }
.venue a { color: #2d3a8c; text-decoration: underline; }
.footer { text-align: center; padding: 13px; font-family: Georgia, serif; font-size: 0.72rem; color: #5c1010; border-top: 1px solid #b8a492; background: #d8c8ba; }
@media(max-width:480px){ .filter-row{flex-direction:column;} .fg{min-width:100%;} }
</style>
</head>
<body>

<div class="header"><h1>2026 Season Schedule</h1></div>

<div class="filters">
  <div class="filter-row">
    <div class="fg">
      <label>Division</label>
      <select id="sdiv" onchange="onDiv()">
        <option value="">— Select Division —</option>
        <option value="JHS">Junior High (JHS)</option>
        <option value="Girls">Girls</option>
        <option value="HS-NY">High School — NY</option>
        <option value="HS-NJ">High School — NJ</option>
        <option value="College">College</option>
        <option value="Mens">Men's</option>
      </select>
    </div>
    <div class="fg">
      <label>Team</label>
      <select id="steam" onchange="onTeam()" disabled>
        <option value="">— Select Division First —</option>
      </select>
    </div>
  </div>
</div>

<div class="main"><div id="out">
  <div class="empty"><div class="icon">🏀</div><h3>Find Your Team's Schedule</h3><p>Select your division and team above<br>to view your full 2026 season schedule.</p></div>
</div></div>

<div class="footer">NA Coptic League 2026 &nbsp;&middot;&nbsp; Regular Season &nbsp;&middot;&nbsp; May 2026 – July 2026</div>

<script>
var TEAMS={
  JHS:["SI 1","SI 2","EB 1","EB 2","Holmdel","Westside","Bayonne SASA","Bayonne VMSJ","Queens","Astoria","Makkar","Philadelphia","Summit"],
  Girls:["SI 1","SI 2","SI 3","EB 1","EB 2","Holmdel","Belleville","Bayonne SASA","BK","Queens","Makkar","Upstate"],
  "HS-NY":["SI 1 1","SI 2 1","SI 2 2","SI 1 2","BK 1","BK 2","Queens","Astoria","LI 1","LI 2"],
  "HS-NJ":["EB 1","EB 2","EB 3","Holmdel","Philly","Westside","Belleville","Bayonne SASA 1","Bayonne SASA 2","Bayonne VMSJ 1","Bayonne VMSJ 2","Piscataway","Makkar","Upstate Paramus"],
  College:["SI 1","SI 2","Holmdel","EB 1","EB 2","EB 3","Bayonne SASA","Bayonne VMSJ","BK","Queens","Upstate","LI","Piscataway","Philly"],
  Mens:["SI 1","SI 2","EB","Holmdel","Bayonne SASA","Hatfield","Summit","LI"]
};
var VENUES={
  HC:{name:"Holy Child Catholic Church",url:"https://maps.google.com/?q=4747+Amboy+Rd,+Staten+Island,+NY+10312"},
  BK:{name:"St. George Community Center",url:"https://maps.google.com/?q=6209+11th+Ave,+Brooklyn,+NY+11219"}
};
var GAMES=[
  {t1:"SI 2",t2:"Holmdel",div:"Mens",date:"2026-05-02",time:"7:00 PM",v:"HC"},
  {t1:"SI 1",t2:"Bayonne SASA",div:"Mens",date:"2026-05-03",time:"7:00 PM",v:"HC"},
  {t1:"Bayonne SASA 1",t2:"Belleville",div:"HS-NJ",date:"2026-05-03",time:"4:00 PM",v:"HC"},
  {t1:"Holmdel",t2:"Westside",div:"HS-NJ",date:"2026-05-02",time:"4:00 PM",v:"HC"},
  {t1:"Upstate Paramus",t2:"Piscataway",div:"HS-NJ",date:"2026-05-03",time:"6:00 PM",v:"HC"},
  {t1:"Queens",t2:"Astoria",div:"JHS",date:"2026-05-02",time:"1:00 PM",v:"BK"},
  {t1:"Westside",t2:"Bayonne SASA",div:"JHS",date:"2026-05-02",time:"2:00 PM",v:"HC"},
  {t1:"SI 1",t2:"Queens",div:"JHS",date:"2026-05-02",time:"3:00 PM",v:"BK"},
  {t1:"Astoria",t2:"SI 2",div:"JHS",date:"2026-05-02",time:"4:00 PM",v:"BK"},
  {t1:"SI 1 1",t2:"SI 2 1",div:"HS-NY",date:"2026-05-03",time:"8:00 PM",v:"HC"},
  {t1:"SI 2 2",t2:"SI 1 2",div:"HS-NY",date:"2026-05-02",time:"6:00 PM",v:"HC"},
  {t1:"BK 1",t2:"BK 2",div:"HS-NY",date:"2026-05-02",time:"7:00 PM",v:"BK"},
  {t1:"Astoria",t2:"Queens",div:"HS-NY",date:"2026-05-02",time:"2:00 PM",v:"BK"},
  {t1:"SI 1",t2:"SI 2",div:"Girls",date:"2026-05-02",time:"8:00 PM",v:"HC"},
  {t1:"BK",t2:"Queens",div:"Girls",date:"2026-05-02",time:"5:00 PM",v:"BK"},
  {t1:"Holmdel",t2:"Belleville",div:"Girls",date:"2026-05-03",time:"5:00 PM",v:"HC"},
  {t1:"BK",t2:"Bayonne VMSJ",div:"College",date:"2026-05-02",time:"6:00 PM",v:"BK"},
  {t1:"Philly",t2:"Holmdel",div:"College",date:"2026-05-02",time:"5:00 PM",v:"HC"},
  {t1:"Piscataway",t2:"Bayonne SASA",div:"College",date:"2026-05-03",time:"3:00 PM",v:"HC"},
  {t1:"SI 2",t2:"Queens",div:"College",date:"2026-05-02",time:"12:00 PM",v:"BK"}
];

function onDiv(){
  var div=document.getElementById('sdiv').value;
  var ts=document.getElementById('steam');
  ts.innerHTML='<option value="">— Select Team —</option>';
  if(div&&TEAMS[div]){
    TEAMS[div].forEach(function(t){var o=document.createElement('option');o.value=t;o.text=t;ts.appendChild(o);});
    ts.disabled=false;
  } else { ts.disabled=true; }
  document.getElementById('out').innerHTML='<div class="empty"><div class="icon">🏀</div><h3>Find Your Team\'s Schedule</h3><p>Select your team above.</p></div>';
}

function onTeam(){
  var div=document.getElementById('sdiv').value;
  var team=document.getElementById('steam').value;
  var out=document.getElementById('out');
  if(!team){return;}
  var f=GAMES.filter(function(g){return g.div===div&&(g.t1===team||g.t2===team);})
    .sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  if(!f.length){out.innerHTML='<div class="empty"><div class="icon">📅</div><h3>No Games Found</h3><p>No games scheduled for <strong>'+team+'</strong> yet.</p></div>';return;}
  var by={};f.forEach(function(g){if(!by[g.date])by[g.date]=[];by[g.date].push(g);});
  var h='<div class="statsbar"><div class="badge"><div class="dot"></div>'+team+'</div><div class="cnt">'+f.length+' game'+(f.length!==1?'s':'')+' &middot; '+div+'</div></div>';
  Object.keys(by).sort().forEach(function(date){
    var dl=new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    h+='<div class="dg"><div class="dh"><span class="dlabel">'+dl+'</span><div class="dline"></div></div>';
    by[date].forEach(function(g){
      var opp=g.t1===team?g.t2:g.t1,p=g.time.split(' '),vn=VENUES[g.v];
      var vhtml=vn?'<div class="venue">📍 <a href="'+vn.url+'" target="_blank">'+vn.name+'</a></div>':'';
      h+='<div class="card"><div class="tcol"><div class="thour">'+p[0]+'</div><div class="tampm">'+p[1]+'</div></div><div class="divdr"></div><div class="mcol"><div class="vs">vs</div><div class="teams">'+team+' <span class="sep">&times;</span> <span class="opp">'+opp+'</span></div>'+vhtml+'</div></div>';
    });
    h+='</div>';
  });
  out.innerHTML=h;
}
</script>
</body>
</html>
